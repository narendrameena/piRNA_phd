###############################################################################
# config.yaml
###############################################################################

# -----------------------------------------------------------------------------
# 1. Paths to reference genome and annotation
# -----------------------------------------------------------------------------
reference_genome: "/mnt/home3/miska/nm667/scratch/inProgress/mice_PiRNA/resources/black6/genome/Mus_musculus.GRCm39.dna.toplevel.fa"
annotation_gtf:    "/mnt/home3/miska/nm667/scratch/inProgress/mice_PiRNA/resources/black6/genome/Mus_musculus.GRCm39.113.chr.gff3"
star_index:        "/mnt/home3/miska/nm667/scratch/inProgress/mice_PiRNA/results/indexs/GRCm39.113"

# -----------------------------------------------------------------------------
# 2. Adapter sequences for small RNA or mRNA
#    (Examples provided; adapt to your library prep)
# -----------------------------------------------------------------------------
adapters:
  # Typical Illumina 3' adapter for small RNA (example)
  sRNA_3prime: "TGGAATTCTCGGGTGCCAAGG"
  #--minimum-length 20 --maximum-length 36 --discard-untrimmed -a TGGAATTCTCGGGTGCCAAGG
  # If you have specific adapters for mRNA, you can add them here:
  # mRNA_5prime: "XXXXX"
  # mRNA_3prime: "YYYYY"

# -----------------------------------------------------------------------------
# 3. STAR alignment parameters
#    "default" for standard RNA-seq; "sRNA_specific" for small RNA
# -----------------------------------------------------------------------------
star_params:
  default: 
    - "--runThreadN 8"
    - "--outSAMtype BAM SortedByCoordinate"
  sRNA_specific:
    - "--alignIntronMax 1"
    - "--alignEndsType EndToEnd"
    - "--outFilterMultimapNmax 100000"
    - "--winAnchorMultimapNmax 200"

# -----------------------------------------------------------------------------
# 4. Trinity parameters (optional, for de novo assembly of RNA-seq)
# -----------------------------------------------------------------------------
trinity_params:
  default:
    - "--max_memory 50G"
    - "--CPU 8"

# -----------------------------------------------------------------------------
# 5. Sample information
#    Each sample entry has:
#       - type: sRNA or RNA
#       - R1: path to read 1
#       - R2: path to read 2 (if paired-end RNA; omit or leave None for sRNA)
# -----------------------------------------------------------------------------
samples:

  # ---------------------------------------------------------------------------
  # E15.5 
  # (No explicit "sRNA" or "RNA" folder in your listing, but these appear
  #  to be single-end data, so let's assume they're sRNA-like.)
  # ---------------------------------------------------------------------------
  E15_5_rep1_run1:
    type: sRNA
    R1: "black6/E15.5/rep1/SRR18050537_1.fastq"

  E15_5_rep1_run2:
    type: sRNA
    R1: "black6/E15.5/rep1/SRR18050538_1.fastq"

  E15_5_rep2:
